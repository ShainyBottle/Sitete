<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SStwendRT Shop</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --text: #f0f0f0;
      --accent: #ffffff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      text-align: center;
      padding: 40px 20px;
    }
    header {
      margin-bottom: 60px;
    }
    h1 {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 1.3rem;
      opacity: 0.7;
      margin-bottom: 40px;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      max-width: 1000px;
      margin: 0 auto;
    }
    .card {
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      width: 340px;
      padding: 40px 30px;
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: translateY(-10px);
      border-color: #fff;
      box-shadow: 0 0 30px rgba(255,255,255,0.1);
    }
    .price {
      font-size: 2.8rem;
      font-weight: 700;
      margin: 20px 0;
    }
    .payment-container {
      margin: 25px 0;
      display: flex;
      justify-content: center;
    }
    .socials {
      margin-top: 80px;
    }
    .socials a {
      display: inline-block;
      margin: 0 15px;
      color: #fff;
      font-size: 1.8rem;
      text-decoration: none;
      transition: 0.3s;
    }
    .socials a:hover { opacity: 0.6; }
    footer {
      margin-top: 100px;
      opacity: 0.5;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>SStwendRT Shop</h1>
    <p class="subtitle">Products • Whitelist & VIP</p>
  </header>

  <div class="products">
    
    <!-- Карточка Whitelist -->
    <div class="card">
      <h2>WHITELIST</h2>
      <div class="price">100 ₽</div>
      <p>Priority access <br>Exclusive role<br>More Scripts</p>
      
      <div class="payment-container">
        <iframe src="https://yoomoney.ru/quickpay/fundraise/button?billNumber=1HDO6KKKD3F.260428" 
                width="300" height="50" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
      </div>
    </div>

    <!-- Карточка VIP -->
    <div class="card">
      <h2>VIP</h2>
      <div class="price">400 ₽</div>
      <p>Full Access<br>All Benefits Whitelist<br>exclusive functions<br>fast support</p>
      
      <div class="payment-container">
        <iframe src="https://yoomoney.ru/quickpay/fundraise/button?billNumber=1HDO6DBAA1S.260428" 
                width="300" height="50" frameborder="0" allowtransparency="true" scrolling="no"></iframe>
      </div>
    </div>

  </div>

  <div class="socials">
    <a href="https://discord.gg/rzsAgKMFx5" target="_blank">Discord</a>
    <a href="https://youtube.com/@sstwendrt?si=-psQitPr6ykBpaA-" target="_blank">YouTube</a>
  </div>

  <footer>
    © 2026 SStwendRT Store • Все права защищены
  </footer>

</body>
</html>
